{% extends "base.html" %}

{% block title %}Ingreso | Boletería Pro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="office-card bg-body p-4">
            <h1 class="h4 mb-3">Ingreso</h1>
            <form method="post" class="row g-3">
                <div class="col-12">
                    <label for="username" class="form-label fw-semibold">Usuario</label>
                    <input type="text" class="form-control" id="username" name="username" autocomplete="username" required autofocus>
                </div>
                <div class="col-12">
                    <label for="password" class="form-label fw-semibold">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
            </form>
            <div class="alert alert-secondary mt-3 mb-0 small">
                Usuario inicial: <strong>admin</strong> · contraseña: <strong>admin123</strong>
            </div>
        </div>
    </div>
</div>
{% endblock %}
